<!DOCTYPE html>
<html lang="en">
  <head>
    <title>肥豬電腦遙控器</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/semantic-ui/2.4.1/semantic.min.css"
    />
    <link rel="stylesheet" href="style.css" />
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/semantic-ui/2.4.1/semantic.min.js"></script>

    <style>
      * {
        -moz-user-select: none;
        -webkit-user-select: none;
      }
      body {
        display: flex;
        flex-direction: column;
        align-items: center;
        touch-action: manipulation;
      }
      h2 {
        margin-top: 15px !important;
      }
      .main.ui {
        width: 100% !important;
      }
      .main.ui > div {
        display: flex;
        margin-bottom: 5px;
      }
      .main.ui > div > button {
        height: 35vh;
        flex: 1;
        margin: 0 0.15em !important;
      }
      .main.ui > div > button > i {
        transform: scale(5);
      }

      #mode-toggle {
        position: fixed;
        top: 10px;
        right: 10px;
        z-index: 100;
      }
      #mode-toggle i {
        transform: scale(1) !important;
      }
      #mouse-mode {
        display: none;
        width: 100%;
        height: 100vh;
        flex-direction: column;
      }
      #mouse-mode.active {
        display: flex;
      }
      #mouse-trackpad {
        flex: 1;
        background-color: #e0e0e0;
        touch-action: none;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.2em;
        color: #999;
      }
      #mouse-scroll-area {
        width: 50px;
        background-color: #ccc;
        touch-action: none;
        display: flex;
        align-items: center;
        justify-content: center;
        writing-mode: vertical-rl;
        color: #888;
        font-size: 0.8em;
      }
      #mouse-buttons {
        display: flex;
        height: 80px;
      }
      #mouse-buttons button {
        flex: 1;
        height: 80px !important;
        margin: 0 !important;
        border-radius: 0 !important;
        font-size: 1.1em;
      }
    </style>
  </head>

  <body>
    <button id="mode-toggle" class="ui labeled icon button">
      <i class="mouse pointer icon"></i>
      滑鼠模式
    </button>

    <h2 id="title">肥豬電腦遙控器</h2>

    <div id="remote-mode" class="main ui container">
      <div>
        <button id="left" class="ui icon button">
          <i class="icon backward"></i>
        </button>
        <button id="space" class="ui icon button">
          <i class="icon pause" style="display: none;"></i>
          <i class="icon play"></i>
        </button>
        <button id="right" class="ui icon button">
          <i class="icon forward"></i>
        </button>
      </div>
      <div>
        <button id="volume_down" class="ui icon button">
          <i class="icon volume down"></i>
        </button>
        <button id="volume_up" class="ui icon button">
          <i class="icon volume up"></i>
        </button>
      </div>
      <div>
        <button id="skip_intro" class="ui icon button">
          <i class="icon step forward"></i>
        </button>
      </div>
    </div>

    <div id="mouse-mode">
      <div style="display: flex; flex: 1;">
        <div id="mouse-trackpad">在此滑動控制滑鼠</div>
        <div id="mouse-scroll-area">捲動</div>
      </div>
      <div id="mouse-buttons">
        <button id="mouse-left" class="ui button">左鍵</button>
        <button id="mouse-right" class="ui button">右鍵</button>
      </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.3.1.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/axios/0.18.0/axios.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/rxjs/6.5.5/rxjs.umd.js"></script>

    <script>
      const $space = $('#space')
      const $left = $('#left')
      const $right = $('#right')
      const $volDown = $('#volume_down')
      const $volUp = $('#volume_up')
      const $skipIntro = $('#skip_intro')
      const { fromEvent, timer } = rxjs
      const { merge, takeUntil, switchMap } = rxjs.operators

      const interval = 350


      $space.click(() => {
        axios.post('/api/space').catch((err) => alert(err))
        $('#space > i').toggle()
      })
      $volDown.click(() => axios.post('/api/volume_down').catch((err) => alert(err)))
      $volUp.click(() => axios.post('/api/volume_up').catch((err) => alert(err)))
      $skipIntro.click(() => axios.post('/api/skip_intro').catch((err) => alert(err)))

      const leftDown = fromEvent($left, 'mousedown').pipe(merge(fromEvent($left, 'touchstart')))
      const leftUp = fromEvent($left, 'mouseup').pipe(merge(fromEvent($left, 'touchend')))
      const rightDown = fromEvent($right, 'mousedown').pipe(merge(fromEvent($right, 'touchstart')))
      const rightUp = fromEvent($right, 'mouseup').pipe(merge(fromEvent($right, 'touchend')))


      rightDown
        .pipe(switchMap(() => timer(0, interval).pipe(takeUntil(rightUp))))
        .subscribe(() => axios.post('/api/right').catch((err) => alert(err)))

      leftDown
        .pipe(switchMap(() => timer(0, interval).pipe(takeUntil(leftUp))))
        .subscribe(() => axios.post('/api/left').catch((err) => alert(err)))

      // ========== Mouse Mode ==========
      const $modeToggle = $('#mode-toggle')
      const $remoteMode = $('#remote-mode')
      const $mouseMode = $('#mouse-mode')
      const $title = $('#title')
      const mouseTrackpad = document.getElementById('mouse-trackpad')
      const mouseScrollArea = document.getElementById('mouse-scroll-area')
      let isMouseMode = false

      $modeToggle.click(() => {
        isMouseMode = !isMouseMode
        if (isMouseMode) {
          $remoteMode.hide()
          $title.hide()
          $mouseMode.addClass('active')
          $modeToggle.html('<i class="gamepad icon"></i> 遙控模式')
        } else {
          $mouseMode.removeClass('active')
          $remoteMode.show()
          $title.show()
          $modeToggle.html('<i class="mouse pointer icon"></i> 滑鼠模式')
        }
      })

      // Trackpad
      let lastTouchX = null
      let lastTouchY = null
      const sensitivity = 2.0

      mouseTrackpad.addEventListener('touchstart', (e) => {
        e.preventDefault()
        lastTouchX = e.touches[0].clientX
        lastTouchY = e.touches[0].clientY
      })

      mouseTrackpad.addEventListener('touchmove', (e) => {
        e.preventDefault()
        const t = e.touches[0]
        if (lastTouchX !== null) {
          const dx = Math.round((t.clientX - lastTouchX) * sensitivity)
          const dy = Math.round((t.clientY - lastTouchY) * sensitivity)
          if (dx !== 0 || dy !== 0) {
            axios.post('/api/mouse/move', { dx, dy }).catch(() => {})
          }
        }
        lastTouchX = t.clientX
        lastTouchY = t.clientY
      })

      mouseTrackpad.addEventListener('touchend', () => {
        lastTouchX = null
        lastTouchY = null
      })

      // Scroll
      let lastScrollY = null

      mouseScrollArea.addEventListener('touchstart', (e) => {
        e.preventDefault()
        lastScrollY = e.touches[0].clientY
      })

      mouseScrollArea.addEventListener('touchmove', (e) => {
        e.preventDefault()
        const t = e.touches[0]
        if (lastScrollY !== null) {
          const dy = Math.round((lastScrollY - t.clientY) / 10)
          if (dy !== 0) {
            axios.post('/api/mouse/scroll', { dy }).catch(() => {})
          }
        }
        lastScrollY = t.clientY
      })

      mouseScrollArea.addEventListener('touchend', () => {
        lastScrollY = null
      })

      // Clicks
      $('#mouse-left').click(() => axios.post('/api/mouse/left_click').catch((err) => alert(err)))
      $('#mouse-right').click(() => axios.post('/api/mouse/right_click').catch((err) => alert(err)))
    </script>
  </body>
</html>
